<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="CubicLauncher - Launcher de Minecraft multiplataforma construido con Rust y SvelteKit" />
    <meta name="theme-color" content="#2a2a2d" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      .loading-init {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        background: #2a2a2d;
        transition: opacity 0.3s ease;
      }
      .loading-init.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .loading-init img {
        width: 80px;
        height: 80px;
        border-radius: 12px;
        animation: pulse 1.5s ease-in-out infinite;
      }
      .loading-init p {
        font-family: 'Inter', sans-serif;
        font-size: 0.875rem;
        color: #a1a1aa;
        animation: pulse 1.5s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }
    </style>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">
      <div class="loading-init" id="loading-init">
        <img src="/rei.png" alt="Cargando" />
        <p>Cargando...</p>
      </div>
      %sveltekit.body%
    </div>
    <script>
      document.getElementById('loading-init')?.classList.add('hidden');
    </script>
  </body>
</html>
