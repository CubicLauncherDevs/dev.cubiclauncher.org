<svg xmlns="http://www.w3.org/2000/svg" width="270" height="65">
  <clipPath id="clip">
    <rect rx="4" width="100%" height="100%" fill="#000"/>
  </clipPath>
  <linearGradient id="grad" x2="0" y2="100%">
    <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
    <stop offset="1" stop-opacity=".1"/>
  </linearGradient>
  <g clip-path="url(#clip)">
    <rect width="100%" height="25" fill="#555"/>

    <g fill="#fff" text-anchor="middle" font-family="DejaVu Sans,Verdana,Geneva,sans-serif" font-size="13" font-weight="bold">
      <text x="135" y="14" dominant-baseline="central" fill="#010101" fill-opacity=".3">CubicLauncher APIs</text>
      <text x="135" y="13" dominant-baseline="central">CubicLauncher APIs</text>
    </g>

    <rect y="25" width="100%" height="20" fill="#555"/>
    <rect x="95" y="25" width="175" height="20" fill="#4c1"/>
    <rect y="25" width="100%" height="20" fill="url(#grad)"/>
    <g fill="#fff" font-family="DejaVu Sans,Verdana,Geneva,sans-serif" font-size="11">
      <text x="85" y="36" text-anchor="end" dominant-baseline="central" fill="#010101" fill-opacity=".3">Skins API</text>
      <text x="85" y="35" text-anchor="end" dominant-baseline="central">Skins API</text>
      <text x="132" y="36" text-anchor="middle" dominant-baseline="central" fill="#010101" fill-opacity=".3">1.0.0</text>
      <text x="132" y="35" text-anchor="middle" dominant-baseline="central">1.0.0</text>
      <text x="215" y="36" text-anchor="middle" dominant-baseline="central" fill="#010101" fill-opacity=".3">✓</text>
      <text x="215" y="35" text-anchor="middle" dominant-baseline="central">✓</text>
    </g>

    <rect y="45" width="100%" height="20" fill="#555"/>
    <rect x="95" y="45" width="175" height="20" fill="#4c1"/>
    <rect y="45" width="100%" height="20" fill="url(#grad)"/>
    <g fill="#fff" font-family="DejaVu Sans,Verdana,Geneva,sans-serif" font-size="11">
      <text x="85" y="56" text-anchor="end" dominant-baseline="central" fill="#010101" fill-opacity=".3">i18n API</text>
      <text x="85" y="55" text-anchor="end" dominant-baseline="central">i18n API</text>
      <text x="132" y="56" text-anchor="middle" dominant-baseline="central" fill="#010101" fill-opacity=".3">1.2.0</text>
      <text x="132" y="55" text-anchor="middle" dominant-baseline="central">1.2.0</text>
      <text x="215" y="56" text-anchor="middle" dominant-baseline="central" fill="#010101" fill-opacity=".3">✓</text>
      <text x="215" y="55" text-anchor="middle" dominant-baseline="central">✓</text>
    </g>
  </g>
</svg>
